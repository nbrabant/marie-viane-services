name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          NITRO_PRESET: static

      - name: Verify build artifacts
        if: always()
        run: |
          echo "--- .output tree ---"
          find .output -maxdepth 4 2>/dev/null || echo "(.output missing)"
          echo "---"
          set -e
          test -f .output/public/index.html || { echo "Missing .output/public/index.html"; exit 1; }
          test -d .output/public/assets || { echo "Missing .output/public/assets/ directory"; exit 1; }
          echo "Build artifacts OK: .output/public/index.html and .output/public/assets/ present"

      - name: Deploy to OVH
        if: github.ref == 'refs/heads/main'
        env:
          SSHPASS: ${{ secrets.OVH_PASSWORD }}
          SSH_HOST: ${{ secrets.OVH_HOST }}
          SSH_USER: ${{ secrets.OVH_USER }}
          SSH_PORT: ${{ secrets.OVH_SSH_PORT }}
        run: |
          sudo apt-get install -y sshpass

          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

          # OVH shared hosting serves static files only (no Node runtime), so we
          # deploy the prerendered output straight to the domain's document root.
          sshpass -e rsync -avz \
            -e "ssh -p $SSH_PORT" \
            .output/public/ \
            "$SSH_USER@$SSH_HOST:~/www/"
