name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          NITRO_PRESET: node-server

      - name: Verify build artifacts
        if: always()
        run: |
          set -e
          test -f .output/server/index.mjs || { echo "Missing .output/server/index.mjs"; exit 1; }
          test -d .output/public/assets || { echo "Missing .output/public/assets/ directory"; exit 1; }
          echo "Build artifacts OK: .output/server/index.mjs and .output/public/assets/ present"

      - name: Deploy to OVH
        if: github.ref == 'refs/heads/main'
        env:
          SSHPASS: ${{ secrets.OVH_PASSWORD }}
          SSH_HOST: ${{ secrets.OVH_HOST }}
          SSH_USER: ${{ secrets.OVH_USER }}
          SSH_PORT: ${{ secrets.OVH_SSH_PORT }}
        run: |
          sudo apt-get install -y sshpass

          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

          sshpass -e rsync -avz --delete \
            -e "ssh -p $SSH_PORT" \
            .output/ \
            "$SSH_USER@$SSH_HOST:~/www/.output/"

          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            'export PORT=80 HOST=0.0.0.0; \
             pm2 restart marie-viane --update-env 2>/dev/null \
              || (pm2 start ~/www/.output/server/index.mjs --name marie-viane && pm2 save)'
